<style>
    :root {
        --azul-header: #005c92; 
        --azul-claro: #009ee2;  
        --azul-intervalo-bg: #e1f5fe;
        --cinza-prof: #888888;
        --sugestao-cor: #cccccc;
        --borda-tabela: #005c92;
    }

    /* Ajuste para não cortar o conteúdo em telas pequenas */
    body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        padding: 10px; /* Reduzido para mobile */
        background: #f1f5f9; 
        color: #1e293b; 
        overflow-x: hidden; 
    }

    /* --- CONTROLES RESPONSIVOS --- */
    .admin-bar { 
        display: flex; 
        flex-wrap: wrap; /* Permite quebrar linha no celular */
        gap: 8px; 
        margin: 0 auto 15px auto; 
        align-items: center; 
        background: white; 
        padding: 10px; 
        border-radius: 10px; 
        max-width: 950px; 
        border: 1px solid #e2e8f0; 
    }

    /* --- CABEÇALHO RESPONSIVO --- */
    .header-escola { 
        display: flex; 
        flex-direction: column; /* Empilha no mobile por padrão */
        gap: 10px;
        align-items: center; 
        margin: 0 auto 20px auto; 
        max-width: 950px; 
    }

    @media (min-width: 600px) {
        .header-escola { flex-direction: row; justify-content: space-between; }
        body { padding: 20px; }
    }

    .titulo-central { 
        color: var(--azul-header); 
        font-size: clamp(18px, 5vw, 24px); /* Fonte diminui em telas menores */
        font-weight: 900; 
        letter-spacing: 2px; 
        text-transform: uppercase; 
        border-bottom: 2px solid #cbd5e1; 
        padding-bottom: 5px; 
        text-align: center;
    }

    /* --- O SEGREDO: CONTAINER COM SCROLL --- */
    .table-container { 
        background: white; 
        border-radius: 20px; 
        border: 2px solid var(--borda-tabela); 
        max-width: 950px; 
        margin: auto; 
        overflow-x: auto; /* Adiciona o scroll horizontal */
        -webkit-overflow-scrolling: touch; /* Scroll suave no iOS */
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        min-width: 600px; /* Garante que a tabela não esmague menos que isso */
    }

    /* Mantendo suas definições de fonte */
    th { background: var(--azul-header); color: white; padding: 12px 5px; font-size: 11px; text-transform: uppercase; }
    td { border: 1px solid #e2e8f0; text-align: center; height: 75px; vertical-align: middle; position: relative; }
    .col-horario { background: var(--azul-claro) !important; color: white !important; font-weight: 700; width: 90px; font-size: 11px; }
    .col-aula { background: #ffffff !important; color: var(--azul-claro) !important; font-weight: 700; width: 45px; font-size: 12px; }

    /* Ajuste do Intervalo para não bugar o texto */
    .is-interval { 
        background-color: var(--azul-intervalo-bg) !important; 
        color: var(--azul-header) !important; 
        font-weight: 400; 
        font-size: 11px; 
        height: 35px !important; 
        white-space: nowrap; /* Evita quebra de linha no texto Intervalo */
    }

    @media print {
        .no-print { display: none !important; }
        .table-container { overflow: visible; border-radius: 0; }
        table { min-width: 100%; }
    }
</style>
